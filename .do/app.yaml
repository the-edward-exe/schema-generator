# DigitalOcean App Platform spec. Either let the UI auto-detect the Procfile,
# or use this with: doctl apps create --spec .do/app.yaml
name: schema-generator
region: nyc
services:
  - name: web
    environment_slug: python
    instance_size_slug: basic-xxs        # smallest paid; or apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    run_command: gunicorn --workers 2 --timeout 180 --bind 0.0.0.0:8080 webapp.app:app
    github:
      repo: the-edward-exe/schema-generator
      branch: main
      deploy_on_push: true
    health_check:
      http_path: /healthz
    routes:
      - path: /
    envs:
      # HTTP basic auth — set these (mark as encrypted SECRET in the UI/spec).
      # Leave unset to run open (not recommended once public).
      - key: AUTH_USER
        scope: RUN_TIME
        value: admin
      - key: AUTH_PASS
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME
      # Optional tuning (also override in the dashboard):
      - key: CRAWL_TIMEOUT     # per-request crawl timeout seconds (default 20)
        scope: RUN_TIME
        value: "30"
      # - key: CRAWL_MAX       # max pages to crawl (default 25)
      # - key: ANTHROPIC_API_KEY  # set (encrypted) to enable AI descriptions
      # - key: SCHEMA_LLM_MODEL   # default claude-haiku-4-5-20251001
